name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip python3-setuptools python3-dev \
            build-essential libssl-dev libffi-dev \
            libncurses5-dev libncursesw5-dev libreadline6-dev \
            libdb5.3-dev libgdbm-dev libsqlite3-dev libbz2-dev \
            libexpat1-dev liblzma-dev zlib1g-dev wget curl git \
            zip unzip openjdk-17-jdk autoconf libtool pkg-config

      - name: Install Cython and Buildozer
        run: |
          pip3 install --upgrade pip
          pip3 install cython==0.29.33
          pip3 install buildozer

      - name: Accept Android SDK licenses
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Build APK
        run: |
          # Force Buildozer to use the correct build-tools
          export ANDROID_BUILD_TOOLS_VERSION=30.0.3
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: paymentmonitor-apk
          path: bin/*.apk
