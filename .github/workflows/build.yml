name: Build APK (Fixed)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip python3-setuptools python3-dev \
            build-essential libssl-dev libffi-dev \
            libncurses5-dev libncursesw5-dev libreadline6-dev \
            libdb5.3-dev libgdbm-dev libsqlite3-dev libbz2-dev \
            libexpat1-dev liblzma-dev zlib1g-dev wget curl git \
            zip unzip openjdk-17-jdk autoconf libtool pkg-config

      - name: Install Cython and Buildozer
        run: |
          pip3 install --upgrade pip
          pip3 install cython==0.29.33
          pip3 install buildozer

      - name: Set up Android SDK (manual)
        run: |
          # Download command-line tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip -d /tmp/
          mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools
          mv /tmp/cmdline-tools ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest
          export ANDROID_SDK_ROOT=~/.buildozer/android/platform/android-sdk
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
          
          # Accept all licenses
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          yes | sdkmanager --licenses > /dev/null 2>&1
          
          # Install platform 30 and build-tools 30.0.3
          sdkmanager "platforms;android-30" "build-tools;30.0.3"
          
          echo "Android SDK installed with build-tools 30.0.3"

      - name: Build APK with Buildozer
        run: |
          export ANDROID_SDK_ROOT=~/.buildozer/android/platform/android-sdk
          export ANDROID_NDK_ROOT=~/.buildozer/android/platform/android-ndk-r25b
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH
          # Force Buildozer to use existing SDK (skip download)
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: paymentmonitor-apk
          path: bin/*.apk
