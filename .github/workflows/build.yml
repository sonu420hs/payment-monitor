name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip \
            python3-setuptools \
            python3-dev \
            build-essential \
            libssl-dev \
            libffi-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libreadline6-dev \
            libdb5.3-dev \
            libgdbm-dev \
            libsqlite3-dev \
            libbz2-dev \
            libexpat1-dev \
            liblzma-dev \
            zlib1g-dev \
            wget \
            curl \
            git \
            zip \
            unzip \
            openjdk-17-jdk \
            autoconf \
            libtool \
            pkg-config \
            zlib1g-dev

      - name: Install Cython and Buildozer
        run: |
          pip3 install --upgrade cython buildozer

      - name: Initialize buildozer (if spec exists)
        run: |
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi

      - name: Build APK
        run: |
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: paymentmonitor-apk
          path: bin/*.apk
